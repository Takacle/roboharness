[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gmr-harness"
version = "0.1.0"
description = "Alignment toolchain for General Motion Retargeting + Robot Simulation"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "MiaoDX", email = "miaodx@hotmail.com" },
    { name = "WLB", email = "wlb@floatinglife.ai" },
]
keywords = ["robotics", "retargeting", "alignment", "mujoco", "gmr", "smplx"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "numpy>=1.21",
]

[project.optional-dependencies]
smplx = [
    "smplx",
    "torch",
    "scipy",
]
mujoco = [
    "mujoco>=3.0",
    "Pillow>=9.0",
    "scipy",
]
vlm = [
    "openai>=1.0",
    "httpx",
]
all = [
    "gmr-harness[smplx,mujoco,vlm]",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.0",
]

[project.scripts]
gmr-harness = "gmr_harness.cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/gmr_harness"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM", "PTH", "TCH", "RUF", "PIE"]
ignore = ["TC001", "TC003"]

[tool.ruff.format]

[tool.pytest.ini_options]
testpaths = ["tests"]
# ROS pytest plugins (launch_testing, launch_testing_ros) crash on import
# due to missing ``lark`` dependency.  Set PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
# when running tests in a ROS-contaminated environment:
#
#   PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTHONPATH=src pytest tests -q -p pytest_cov
#
# Or use the helper script:
#
#   bash scripts/run_tests.sh

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "numpy.*",
    "mujoco.*",
    "scipy.*",
    "smplx.*",
    "torch.*",
    "PIL.*",
    "openai.*",
    "anthropic.*",
    "httpx.*",
    "general_motion_retargeting.*",
]
ignore_missing_imports = true
